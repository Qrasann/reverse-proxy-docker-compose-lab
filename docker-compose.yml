
services:

 backend:
  build: ./backend
  restart: always
  environment:
    - PORT=5000
    - MESSAGE=Hello from ENV

  healthcheck:
   test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
   interval: 10s
   timeout: 5s
   retries: 3

 proxy:
  image: nginx
  restart: always
  ports:
   - "80:80"
  volumes:
   - ./proxy/default.conf:/etc/nginx/conf.d/default.conf

  depends_on:
      - site1
      - site2
      - backend

 site1:
  image: nginx
  volumes:
    - ./site1:/usr/share/nginx/html

 site2:
  image: nginx
  volumes:
    - ./site2:/usr/share/nginx/html
