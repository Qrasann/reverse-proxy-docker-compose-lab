upstream backend_servers {
	server backend:5000;
}

server {
	listen 80;

	location /site1/ {
		proxy_pass http://site1/;
	}

	location /site2/ {
		proxy_pass http://site2/;
	
	}
	
	location /api/ {
		proxy_pass http://backend:5000/api/;
	
	}
	
	location /health {
		proxy_pass http://backend:5000/health;
	
	}

}
